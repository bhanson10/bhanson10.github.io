<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Header with Navigation Menu</title>
<style>
    /* Style for the header */
    header {
        background-color: #fff;
        color: #fff;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    nav {
        font-family: "Bookerly-Bold", sans-serif;
        color: #182B49;
        display: flex;
        justify-content: right;
        background-color: #fff;
        padding: 10px;
    }

    /* Style for the navigation menu */
    nav ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
    }

    nav ul li {
        display: inline;
        margin-top: 30px; /* Add margin-top to create space between dropdown options */
    }

    nav ul li a {
        text-decoration: none;
        padding: 20px 30px;
        border-radius: 5px;
        margin: 0 5px;
        background-color: #fff;
        transition: background-color 0.3s;
    }

    nav ul li a:hover {
        background-color: #C69214;
    }

    nav ul li:hover ul {
        display: block;
    }

    nav ul li ul {
        display: none;
        position: absolute;
        background-color: #fff;
        padding: 0;
        width: 150px; /* Set a fixed width for the dropdown menu */
    }

    nav ul li ul li {
        display: block;
        margin-top: 30px; /* Add margin-top to create space between dropdown options */
    }

    nav ul li ul li a {
        text-decoration: none;
        padding: 20px 30px;
        border-radius: 5px;
        margin: 0 5px;
        background-color: #fff;
        transition: background-color 0.3s;
        text-decoration: none;
        white-space: nowrap; /* Prevent wrapping */
        overflow: hidden; /* Hide overflow */
        text-overflow: ellipsis; /* Show ellipsis for overflowed text */
        font-size: 14px; /* Adjust font size as needed */
    }

    nav ul li ul li a:hover {
        background-color: #C69214;
    }
</style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="images/Pillars-of-creation.png" alt="Pillars-of-creation" class="logo-image">
            Home 
        </div>
        <nav class="nav">

                    <ul>

                    </ul>
                </li>
                <li><a href="AFRL.html">AFRL</a></li>
                <li><a href="CSM.html">CSM</a></li>
                <li><a href="UF.html">UF</a></li>
                <li><a href="Publications_Conferences.html">Publications/Conferences</a></li>
            </ul>
        </nav>
    </header>

</html>

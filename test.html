<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Header with Navigation Menu</title>
<style>
    /* Style for the header */
    header {
        background-color: #fff;
        color: #fff;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    nav {
        font-family: "Bookerly-Bold", sans-serif;
        color: #182B49;
        display: flex;
        justify-content: right;
        background-color: #fff;
        padding: 10px;
    }

    /* Style for the navigation menu */
    nav ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
    }

    nav ul li {
        display: inline;
        margin-top: 20px; /* Add margin-top to create space between dropdown options */
    }

    nav ul li a {
        text-decoration: none;
        padding: 20px 30px;
        border-radius: 5px;
        margin: 0 5px;
        background-color: #fff;
        transition: background-color 0.3s;
    }

    nav ul li a:hover {
        background-color: #C69214;
    }

    nav ul li:hover ul {
        display: block;
    }

    nav ul li ul {
        display: none;
        position: absolute;
        background-color: #333;
        padding: 0;
        width: 300px; /* Set a fixed width for the dropdown menu */
    }

    nav ul li ul li {
        display: block;
        margin-top: 20px; /* Add margin-top to create space between dropdown options */
    }

    nav ul li ul li a {
        text-decoration: none;
        padding: 20px 30px;
        border-radius: 5px;
        margin: 0 5px;
        background-color: #fff;
        transition: background-color 0.3s;
    }

    nav ul li ul li a:hover {
        background-color: #C69214;
    }
</style>
</head>
<body>

<header>
    <nav>
        <ul>
            <li>
                <a href="test.html">UCSD</a>
                <ul>
                    <li><a href="AFRL.html"> Probabilistic Search</a></li>
                    <li><a href="UCSD.html"> Probabilistic Search</a></li>
                    <li><a href="CSM.html"> Probabilistic Search</a></li>
                </ul>
            </li>
            <li><a href="AFRL.html">Home</a></li>
            <li><a href="UCSD.html">About</a></li>
            <li><a href="CSM.html">Contact</a></li>
        </ul>
    </nav>
</header>

</body>
</html>

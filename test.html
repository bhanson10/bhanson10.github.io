<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Header with Navigation Menu</title>
<style>
    /* Style for the header */
    header {
        background-color: #333;
        color: #fff;
        padding: 10px 20px;
    }

    /* Style for the navigation menu */
    nav ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
    }

    nav ul li {
        display: inline;
    }

    nav ul li a {
        color: #fff;
        text-decoration: none;
        padding: 10px 20px;
        display: inline-block;
    }

    nav ul li:hover ul {
        display: block;
    }

    nav ul li ul {
        display: none;
        position: absolute;
        background-color: #333;
        padding: 0;
    }

    nav ul li ul li {
        display: block;
    }

    nav ul li ul li a {
        display: block;
        padding: 10px 20px;
        color: #fff;
        text-decoration: none;
    }
</style>
</head>
<body>

<header>
    <nav>
        <ul>
            <li>
                <a href="#">UCSD</a>
                <ul>
                    <li><a href="AFRL.html">Page 1</a></li>
                    <li><a href="UCSD.html">Page 2</a></li>
                    <li><a href="CSM.html">Page 3</a></li>
                </ul>
            </li>
            <li><a href="AFRL.html">Home</a></li>
            <li><a href="UCSD.html">About</a></li>
            <li><a href="CSM.html">Contact</a></li>
        </ul>
    </nav>
</header>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Overlay Generator</title>
  <style>
    #image-container {
      position: relative;
      display: inline-block;
    }

    #text-overlay {
      position: absolute;
      left: 80%;
      top: 30%;
      transform: translate(-50%, -50%) rotate(-5deg);
      font-family: Georgia, serif;
      font-size: 24pt;
      color: #f6f2c1; /* Default color */
    }

    #rectangle-overlay {
      position: absolute;
      left: 30%; /* Default left position for the rectangle */
      top: 30%; /* Default top position for the rectangle */
      width: 100px; /* Default width of the rectangle */
      height: 50px; /* Default height of the rectangle */
      background-color: #000000; /* Default color of the rectangle */
      display: none; /* Initially hidden */
    }

    #text-input {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>Cash-Money Album Cover Generator Generator</h1>

  <label for="sentence">Album Title:</label>
  <input type="text" id="sentence" maxlength="30">
  <button onclick="addText()">Add</button> <br>

  <label for="addRectangle">Witness Protection</label>
  <input type="checkbox" id="addRectangle">

  <button onclick="addRectangle()">Add Rectangle</button> <br>

  <div id="image-container">
    <img id="image" src="images/CM.jpg" alt="Your Image">
    <div id="text-overlay"></div>
  </div>

  <script>
    function addText() {
      const sentence = document.getElementById('sentence').value;
      const textOverlay = document.getElementById('text-overlay');
      textOverlay.innerHTML = sentence;
    }

    function addRectangle() {
      const addRectangleCheckbox = document.getElementById('addRectangle');
      const rectangleOverlay = document.getElementById('rectangle-overlay');

      if (addRectangleCheckbox.checked) {
        rectangleOverlay.style.display = 'block';
      } else {
        rectangleOverlay.style.display = 'none';
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Overlay Generator</title>
  <style>
    #image-container {
      position: relative;
      display: inline-block;
    }

    #text-overlay {
      position: absolute;
      left: 80%;
      top: 30%;
      transform: translate(-50%, -50%) rotate(-5deg);
      font-family: Georgia, serif;
      font-size: 24pt;
      color: #f6f2c1; /* Default color */
    }

    #text-input {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>Cash-Money Album Cover Generator Generator</h1>

  <label for="sentence">Album Title:</label>
  <input type="text" id="sentence" maxlength="30">
  <button onclick="addText()">Add</button>

  <div id="image-container">
    <img id="image" src="images/CM.jpg" alt="Your Image">
    <div id="text-overlay"></div>
  </div>

  <script>
    function addText() {
      const sentence = document.getElementById('sentence').value;
      const textOverlay = document.getElementById('text-overlay');
      textOverlay.innerHTML = sentence;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Header with Navigation Menu</title>
<style>
    /* Style for the header */
    header {
        background-color: #fff;
        color: #fff;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    nav {
        font-family: "Bookerly-Bold", sans-serif;
        color: #182B49;
        display: flex;
        justify-content: right;
        background-color: #fff;
        padding: 10px;
    }

    /* Style for the navigation menu */
    nav ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
    }

    nav ul li {
        display: inline;
        position: relative;
    }

    nav ul li a {
        color: #fff;
        text-decoration: none;
        padding: 10px 20px;
        display: inline-block;
    }

    nav ul li:hover ul {
        display: block;
    }

    nav ul li ul {
        display: none;
        position: absolute;
        background-color: #333;
        padding: 0;
        width: 150px; /* Set a fixed width for the dropdown menu */
        left: 0; /* Left-align the dropdown menu */
    }

    nav ul li ul li {
        display: block;
        margin-top: 5px; /* Add margin-top to create space between dropdown options */
    }

    nav ul li ul li a {
        display: block;
        padding: 10px 20px;
        color: #fff;
        text-decoration: none;
        white-space: nowrap; /* Prevent wrapping */
        overflow: hidden; /* Hide overflow */
        text-overflow: ellipsis; /* Show ellipsis for overflowed text */
        font-size: 14px; /* Adjust font size as needed */
    }
</style>
</head>
<body>

<header>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li>
                <a href="#">UCSD</a>
                <ul>
                    <li><a href="#">Page 1</a></li>
                    <li><a href="#">Page 2 With Longer Text</a></li> <!-- Example of longer text -->
                    <li><a href="#">Page 3 With Even Longer Text</a></li> <!-- Example of even longer text -->
                </ul>
            </li>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- Your content goes here -->

</body>
</html>

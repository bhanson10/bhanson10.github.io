    <script>
        // Function to check if the video is in the viewport
        function isElementInViewport(el) {
            var rect = el.getBoundingClientRect();
            return (
                rect.top >= 0 &&
                rect.left >= 0 &&
                rect.bottom <= (window.innerHeight || document.documentElement.clientHeight) &&
                rect.right <= (window.innerWidth || document.documentElement.clientWidth)
            );
        }
    
        // Function to check if the video is visible and play it
        function checkVideoVisible() {
            var video = document.querySelector('video');
            if (isElementInViewport(video)) {
                video.play();
            } else {
                video.pause();
            }
        }
    
        // Check if the video is visible on page load
        checkVideoVisible();
    
        // Check if the video is visible when scrolling
        window.addEventListener('scroll', function() {
            checkVideoVisible();
        });
    </script>
